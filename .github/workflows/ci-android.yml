name: CI Android

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci-android.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci-android.yml'

env:
  CMAKE_VERSION: '3.31.0'
  ANDROID_NDK_VERSION: 27.0.12077973

jobs:
  ci-android:
    name: Android CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Set NDK path
      run: |
        NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | grep -E "[0-9]+\.[0-9]+\.[0-9]+" | head -n 1)
        if [ -z "$NDK_PATH" ]; then
          NDK_PATH="$ANDROID_HOME/ndk-bundle"
        fi
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "Found NDK at: $NDK_PATH"

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Configure
      run: cmake --preset engine-android-arm64-debug

    - name: Build Engine
      run: cmake --build build/engine-android-arm64-debug --parallel 2
