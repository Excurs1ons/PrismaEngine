name: Build Android Engine

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/engine/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'projects/android/Engine.cmake'
      - '.github/workflows/build-android-engine.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/engine/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'projects/android/Engine.cmake'
      - '.github/workflows/build-android-engine.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
        - Debug
        - Release
        - Both
      abi:
        description: 'ABI to build'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - arm64-v8a
        - armeabi-v7a

env:
  CMAKE_VERSION: '3.31.0'
  ANDROID_NDK_VERSION: 27.0.12077973

jobs:
  # Debug build
  build-android-engine-debug:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'Debug' || github.event.inputs.build_type == 'Both'
    name: Android Engine Debug (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi:
          - arm64-v8a
          - armeabi-v7a

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Set NDK path
      run: |
        NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | grep -E "[0-9]+\.[0-9]+\.[0-9]+" | head -n 1)
        if [ -z "$NDK_PATH" ]; then
          NDK_PATH="$ANDROID_HOME/ndk-bundle"
        fi
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "Found NDK at: $NDK_PATH"

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/engine-android-${{ matrix.abi }}-debug
        key: ${{ runner.os }}-engine-android-${{ matrix.abi }}-debug-${{ hashFiles('src/**', 'cmake/**', 'CMakeLists.txt', 'CMakePresets.json') }}

    - name: Clean old dependencies cache
      run: rm -rf build/engine-android-${{ matrix.abi }}-debug/_deps/stb

    - name: Configure CMake
      run: |
        cmake -B build/engine-android-${{ matrix.abi }}-debug \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=30 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Debug \
          -DPRISMA_BUILD_EDITOR=OFF \
          -DPRISMA_BUILD_RUNTIME=OFF \
          -DPRISMA_ENABLE_RENDER_VULKAN=ON \
          -DPRISMA_USE_FETCHCONTENT=ON \
          -G Ninja

    - name: Build Engine
      run: cmake --build build/engine-android-${{ matrix.abi }}-debug --parallel 2

    - name: Package
      run: |
        mkdir -p artifacts/${{ matrix.abi }}
        cmake --install build/engine-android-${{ matrix.abi }}-debug --config Debug --prefix artifacts/${{ matrix.abi }}
        tar czf PrismaEngine-android-${{ matrix.abi }}-debug.tar.gz -C artifacts .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEngine-android-${{ matrix.abi }}-debug
        path: PrismaEngine-android-${{ matrix.abi }}-debug.tar.gz
        retention-days: 30

  # Release build
  build-android-engine-release:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'Release' || github.event.inputs.build_type == 'Both')
    name: Android Engine Release (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi:
          - arm64-v8a
          - armeabi-v7a

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Set NDK path
      run: |
        NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | grep -E "[0-9]+\.[0-9]+\.[0-9]+" | head -n 1)
        if [ -z "$NDK_PATH" ]; then
          NDK_PATH="$ANDROID_HOME/ndk-bundle"
        fi
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/engine-android-${{ matrix.abi }}-release
        key: ${{ runner.os }}-engine-android-rel-${{ matrix.abi }}-${{ hashFiles('src/engine/**', 'projects/android/Engine.cmake', 'cmake/**') }}

    - name: Clean old dependencies cache
      run: rm -rf build/engine-android-${{ matrix.abi }}-release/_deps/stb

    - name: Configure CMake
      run: |
        cmake -B build/engine-android-${{ matrix.abi }}-release \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=30 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DPRISMA_BUILD_EDITOR=OFF \
          -DPRISMA_BUILD_RUNTIME=OFF \
          -DPRISMA_ENABLE_RENDER_VULKAN=ON \
          -DPRISMA_USE_FETCHCONTENT=ON \
          -G Ninja

    - name: Build Engine
      run: cmake --build build/engine-android-${{ matrix.abi }}-release --parallel 2

    - name: Package
      run: |
        mkdir -p artifacts/${{ matrix.abi }}
        cmake --install build/engine-android-${{ matrix.abi }}-release --config Release --prefix artifacts/${{ matrix.abi }}
        tar czf PrismaEngine-android-${{ matrix.abi }}-release.tar.gz -C artifacts .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEngine-android-${{ matrix.abi }}-release
        path: PrismaEngine-android-${{ matrix.abi }}-release.tar.gz
        retention-days: 30
