name: Build Windows Engine

on:
  workflow_run:
    workflows: ["CI Windows"]
    types: [completed]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
        - Debug
        - Release
        - Both

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  # еЏЄжњ‰ењ?CI жЈЂжџҐйЂљиї‡ж€–ж‰‹еЉЁи§¦еЏ‘ж—¶ж‰ЌиїђиЎ?
  check-success:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - run: echo "CI check passed or manually triggered. Proceeding with build..."

  # Debug build
  build-windows-engine-debug:
    needs: check-success
    name: Windows Engine Debug
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: .dependencies
        key: ${{ runner.os }}-deps-${{ hashFiles('cmake/DependencyVersions.cmake') }}
        restore-keys: |
          ${{ runner.os }}-deps-
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Configure CMake
      run: cmake --preset engine-windows-x64-debug

    - name: Build Engine
      run: cmake --build build/engine-windows-x64-debug --config Debug --parallel

    - name: Package
      run: |
        mkdir -p package-win64-debug/lib/Debug
        mkdir -p package-win64-debug/include
        copy build\engine-windows-x64-debug\lib\Debug\PrismaEngine.lib package-win64-debug\lib\Debug\
        xcopy src\engine\*.h package-win64-debug\include /E /I /Y 2>nul || echo No headers
        cd package-win64-debug
        7z a ..\PrismaEngine-win64-debug.zip *

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEngine-win64-debug
        path: PrismaEngine-win64-debug.zip

