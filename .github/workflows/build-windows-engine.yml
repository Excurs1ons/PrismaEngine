name: Build Windows Engine

on:
  workflow_run:
    workflows: ["CI Windows"]
    types: [completed]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
        - Debug
        - Release
        - Both

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  check-success:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "CI check passed or manually triggered. Proceeding with build..."
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "CI check failed or skipped. Skipping build..."
          fi

  # Debug build
  build-windows-engine-debug:
    needs: check-success
    if: needs.check-success.outputs.should_run == 'true'
    name: Windows Engine Debug
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: .dependencies
        key: ${{ runner.os }}-deps-v3-${{ hashFiles('cmake/DependencyVersions.cmake') }}
        restore-keys: |
          ${{ runner.os }}-deps-v3-
          ${{ runner.os }}-deps-

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Configure CMake
      run: cmake --preset engine-windows-x64-debug

    - name: Build Engine
      run: cmake --build build/engine-windows-x64-debug --config Debug --parallel

    - name: Package
      run: |
        mkdir -p package-win64-debug/lib/Debug
        mkdir -p package-win64-debug/include
        copy build\engine-windows-x64-debug\lib\Debug\PrismaEngine.lib package-win64-debug\lib\Debug\
        xcopy src\engine\*.h package-win64-debug\include /E /I /Y 2>nul || echo No headers
        cd package-win64-debug
        7z a ..\PrismaEngine-win64-debug.zip *

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEngine-win64-debug
        path: PrismaEngine-win64-debug.zip

