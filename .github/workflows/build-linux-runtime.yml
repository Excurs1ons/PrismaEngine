name: Build Linux Runtime

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/runtime/linux/**'
      - 'src/game/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-linux-runtime.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/runtime/linux/**'
      - 'src/game/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-linux-runtime.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  build-linux-runtime:
    name: Linux Runtime
    runs-on: ubuntu-latest

    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Install SDL3 and Vulkan dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev libdrm-dev libvulkan-dev vulkan-tools

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/runtime-linux-x64-${{ env.BUILD_TYPE }}
        key: ${{ runner.os }}-runtime-linux-${{ env.BUILD_TYPE }}-${{ hashFiles('src/**', 'CMakeLists.txt', 'CMakePresets.json') }}

    - name: Configure
      run: cmake --preset runtime-linux-x64-${{ env.BUILD_TYPE }}

    - name: Build Runtime
      run: cmake --build build/runtime-linux-x64-${{ env.BUILD_TYPE }} --target Runtime --parallel 2

    - name: Build Game
      run: cmake --build build/runtime-linux-x64-${{ env.BUILD_TYPE }} --target Game --parallel 2

    - name: Package
      run: |
        mkdir -p package-x64-${{ env.BUILD_TYPE }}
        cp build/runtime-linux-x64-${{ env.BUILD_TYPE }}/bin/Runtime package-x64-${{ env.BUILD_TYPE }}/
        cp build/runtime-linux-x64-${{ env.BUILD_TYPE }}/bin/*.so* package-x64-${{ env.BUILD_TYPE }}/ 2>/dev/null || echo No shared libs
        cp -r assets package-x64-${{ env.BUILD_TYPE }}/assets 2>/dev/null || echo No assets
        tar czf PrismaGame-linux-x64-${{ env.BUILD_TYPE }}.tar.gz -C package-x64-${{ env.BUILD_TYPE }} .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaGame-linux-x64-${{ env.BUILD_TYPE }}
        path: PrismaGame-linux-x64-${{ env.BUILD_TYPE }}.tar.gz
        retention-days: 30
