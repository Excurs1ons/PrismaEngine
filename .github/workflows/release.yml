name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Get version from tag
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/}
        fi
        VERSION=${VERSION#v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

  release-windows-engine:
    name: Windows Engine
    runs-on: windows-latest
    needs: get-version

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Configure
      run: cmake --preset windows-x64-release

    - name: Build Engine
      run: cmake --build build/windows-x64-release --config Release --parallel

    - name: Package
      run: |
        mkdir -p package-x64-release/lib/Release
        mkdir -p package-x64-release/include
        copy build\windows-x64-release\lib\Release\PrismaEngine.lib package-x64-release\lib\Release\
        xcopy src\engine\*.h package-x64-release\include /E /I /Y 2>nul || echo No headers
        cd package-x64-release
        7z a ../PrismaEngine-win64-release.zip *

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.get-version.outputs.version }}
        name: PrismaEngine v${{ needs.get-version.outputs.version }}
        draft: false
        prerelease: false
        files: PrismaEngine-win64-release.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
