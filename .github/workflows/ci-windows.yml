name: CI Windows

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'projects/**'
      - 'cmake/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'projects/**'
      - 'cmake/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/**'
  workflow_dispatch:


env:
  CMAKE_VERSION: '3.31.0'

jobs:
  ci-windows:
    name: Windows CI
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Build Engine
      run: |
        cmake --preset engine-windows-x64-debug
        cmake --build build/engine-windows-x64-debug --config Debug --parallel

    # SDK packaging disabled due to install export issues
