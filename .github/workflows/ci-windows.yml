name: CI Windows

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci-windows.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci-windows.yml'

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  ci-windows:
    name: Windows CI
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Configure and Package SDK
      run: powershell -File scripts/package-sdk.ps1 -Version "0.1.0" -Config "Debug"

    - name: Build PrismaCraft (SDK Integration Test)
      run: |
        mkdir projects/PrismaCraft/build
        cd projects/PrismaCraft/build
        cmake .. -DPrismaEngine_DIR=$PWD/../../../sdk/out/lib/cmake/PrismaEngine
        cmake --build . --config Debug --parallel 4

