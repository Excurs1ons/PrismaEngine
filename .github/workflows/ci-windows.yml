name: CI Windows

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci-windows.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci-windows.yml'

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  ci-windows:
    name: Windows CI
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Configure
      run: cmake --preset engine-windows-x64-debug

    - name: Build Engine
      run: cmake --build build/engine-windows-x64-debug --config Debug --target Engine --parallel 4
