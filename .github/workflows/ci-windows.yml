name: CI Windows

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'projects/**'
      - 'cmake/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'projects/**'
      - 'cmake/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  ci-windows:
    name: Windows CI
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: .dependencies
        key: ${{ runner.os }}-deps-v3-${{ hashFiles('cmake/DependencyVersions.cmake') }}
        restore-keys: |
          ${{ runner.os }}-deps-v3-
          ${{ runner.os }}-deps-

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@main
      with:
        vulkan-query-version: 1.4.304.0
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true

    - name: Build Engine with SDK (includes PrismaCraft game)
      run: |
        cmake --preset engine-windows-x64-debug -DPRISMA_BUILD_SDK=ON
        cmake --build build/engine-windows-x64-debug --config Debug --parallel


