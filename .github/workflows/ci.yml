name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  # 快速编译检查 - 验证代码可以正常编译
  ci-windows:
    name: Windows CI
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Configure
      run: cmake --preset windows-x64-debug

    - name: Build Engine
      run: cmake --build build/windows-x64-debug --config Debug --target PrismaEngine --parallel 4

  ci-android:
    name: Android CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Set NDK path
      run: |
        NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | grep -E "[0-9]+\.[0-9]+\.[0-9]+" | head -n 1)
        if [ -z "$NDK_PATH" ]; then
          NDK_PATH="$ANDROID_HOME/ndk-bundle"
        fi
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "Found NDK at: $NDK_PATH"

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Configure (ARM64)
      run: |
        cmake -B build-android-arm64-ci \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=24 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Debug \
          -DPRISMA_BUILD_EDITOR=OFF \
          -DPRISMA_BUILD_RUNTIME=OFF \
          -DPRISMA_ENABLE_RENDER_VULKAN=ON \
          -DPRISMA_USE_FETCHCONTENT=ON \
          -G Ninja

    - name: Build Engine
      run: cmake --build build-android-arm64-ci --parallel 2
