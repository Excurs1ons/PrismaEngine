name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  # 快速编译检查 - 验证代码可以正常编译
  ci-windows:
    name: Windows CI
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Configure
      run: cmake --preset engine-windows-x64-debug

    - name: Build Engine
      run: cmake --build build/engine-windows-x64-debug --config Debug --target Engine --parallel 4
