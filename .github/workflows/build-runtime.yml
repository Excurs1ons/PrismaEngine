name: Build Runtime

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/runtime/**'
      - 'src/game/**'
      - 'src/engine/**'
      - 'projects/android/PrismaAndroid/**'
      - '.github/workflows/build-runtime.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/runtime/**'
      - 'src/game/**'
      - 'src/engine/**'
      - 'projects/android/PrismaAndroid/**'
      - '.github/workflows/build-runtime.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - windows
        - android
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

env:
  CMAKE_VERSION: '3.31.0'
  ANDROID_NDK_VERSION: 27.0.12077973

jobs:
  # ========== Windows Runtime ==========
  build-windows-runtime:
    name: Windows Runtime
    runs-on: windows-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'

    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/runtime-windows-x64-${{ env.BUILD_TYPE }}
        key: ${{ runner.os }}-runtime-${{ env.BUILD_TYPE }}-${{ hashFiles('src/**', 'CMakeLists.txt', 'CMakePresets.json') }}

    - name: Configure
      run: cmake --preset runtime-windows-x64-${{ env.BUILD_TYPE }}

    - name: Build Runtime
      run: cmake --build build/runtime-windows-x64-${{ env.BUILD_TYPE }} --config ${{ env.BUILD_TYPE == 'debug' && 'Debug' || 'Release' }} --target Runtime --parallel

    - name: Build Game
      run: cmake --build build/runtime-windows-x64-${{ env.BUILD_TYPE }} --config ${{ env.BUILD_TYPE == 'debug' && 'Debug' || 'Release' }} --target Game --parallel

    - name: Package
      run: |
        mkdir -p package-x64-${{ env.BUILD_TYPE }}
        $cfg = "${{ env.BUILD_TYPE == 'debug' && 'Debug' || 'Release' }}"
        copy "build\runtime-windows-x64-${{ env.BUILD_TYPE }}\bin\$cfg\Runtime.exe" "package-x64-${{ env.BUILD_TYPE }}\"
        copy "build\runtime-windows-x64-${{ env.BUILD_TYPE }}\bin\$cfg\*.dll" "package-x64-${{ env.BUILD_TYPE }}\" 2>$null || echo No DLLs
        xcopy assets "package-x64-${{ env.BUILD_TYPE }}\assets" /E /I /Y 2>$null || echo No assets
        xcopy projects "package-x64-${{ env.BUILD_TYPE }}\projects" /E /I /Y 2>$null || echo No projects
        cd package-x64-${{ env.BUILD_TYPE }}
        7z a ../PrismaGame-x64-${{ env.BUILD_TYPE }}.zip *

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaGame-x64-${{ env.BUILD_TYPE }}
        path: PrismaGame-x64-${{ env.BUILD_TYPE }}.zip
        retention-days: 30

  # ========== Android Runtime ==========
  build-android-runtime:
    name: Android Runtime
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'
    defaults:
      run:
        working-directory: projects/android/PrismaAndroid

    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Set NDK path
      run: |
        NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | grep -E "[0-9]+\.[0-9]+\.[0-9]+" | head -n 1)
        if [ -z "$NDK_PATH" ]; then
          NDK_PATH="$ANDROID_HOME/ndk-bundle"
        fi
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "Found NDK at: $NDK_PATH"

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-android-${{ hashFiles('projects/android/PrismaAndroid/**/*.gradle*') }}

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: projects/android/PrismaAndroid/.cxx
        key: ${{ runner.os }}-android-runtime-${{ env.BUILD_TYPE }}-${{ hashFiles('src/runtime/android/**', 'src/engine/**', 'projects/android/PrismaAndroid/**/CMakeLists.txt', 'projects/android/PrismaAndroid/**/build.gradle*') }}

    - name: Grant execute permission
      run: chmod +x ./gradlew

    - name: Build APK
      run: |
        # capitalize first letter for Gradle task
        gradle_task=$(echo "${{ env.BUILD_TYPE }}" | sed 's/./\u&/')
        ./gradlew assemble${gradle_task} --build-cache --parallel

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-runtime-${{ env.BUILD_TYPE }}
        path: projects/android/PrismaAndroid/app/build/outputs/apk/${{ env.BUILD_TYPE }}/*.apk
        retention-days: 30
        if-no-files-found: ignore
