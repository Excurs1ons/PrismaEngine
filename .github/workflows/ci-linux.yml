name: CI Linux

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  ci-linux-x64:
    name: Linux x64 CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: .dependencies
        key: ${{ runner.os }}-deps-${{ hashFiles('cmake/DependencyVersions.cmake') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Install SDL3 and Vulkan dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev libdrm-dev libvulkan-dev vulkan-tools

    - name: Configure
      run: cmake --preset engine-linux-x64-debug

    - name: Build Engine
      run: cmake --build build/engine-linux-x64-debug --parallel 2

