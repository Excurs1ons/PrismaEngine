name: Build Android Runtime

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'projects/android/PrismaAndroid/**'
      - '.github/workflows/build-android-runtime.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'projects/android/PrismaAndroid/**'
      - '.github/workflows/build-android-runtime.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

env:
  CMAKE_VERSION: '3.31.0'
  ANDROID_NDK_VERSION: 27.0.12077973

jobs:
  build-android-runtime:
    name: Android Runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/android/PrismaAndroid

    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Set NDK path
      run: |
        NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
        if [ ! -d "$NDK_PATH" ]; then
          NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | grep -E "[0-9]+\.[0-9]+\.[0-9]+" | head -n 1)
        fi
        if [ -z "$NDK_PATH" ]; then
          NDK_PATH="$ANDROID_HOME/ndk-bundle"
        fi
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "Found NDK at: $NDK_PATH"

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Grant execute permission
      run: chmod +x ./gradlew

    - name: Build APK
      id: build_apk
      run: |
        gradle_task=$(echo "${{ env.BUILD_TYPE }}" | sed 's/./\u&/')
        # 增加 --info 和 --stacktrace 以获取更多 Gradle 细节
        ./gradlew assemble${gradle_task} --build-cache --parallel --info --stacktrace
      continue-on-error: true

    - name: Debug C++ Failure
      if: steps.build_apk.outcome == 'failure'
      run: |
        echo "=== Gradle Build Failed, searching for C++ compiler logs ==="
        # 查找 CMake/Ninja 生成的详细错误日志并打印
        find .cxx -name "*.log" -o -name "ninja_log" | xargs -I{} sh -c "echo 'LOG FILE: {}'; cat {}; echo '---'"
        # 打印生成的构建文件内容（如果有的话）
        find .cxx -name "build.ninja" -maxdepth 4 | xargs -I{} sh -c "echo 'NINJA FILE: {}'; head -n 50 {}; echo '---'"
        # 强制退出以标记 Job 失败
        exit 1

    - name: Upload artifacts
      if: steps.build_apk.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: android-runtime-${{ env.BUILD_TYPE }}
        path: projects/android/PrismaAndroid/app/build/outputs/apk/${{ env.BUILD_TYPE }}/*.apk
        retention-days: 30
