name: Build Android Runtime

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'projects/android/PrismaAndroid/**'
      - '.github/workflows/build-android-runtime.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'projects/android/PrismaAndroid/**'
      - '.github/workflows/build-android-runtime.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

env:
  CMAKE_VERSION: '3.31.0'
  ANDROID_NDK_VERSION: 27.0.12077973

jobs:
  build-android-runtime:
    name: Android Runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/android/PrismaAndroid

    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Set NDK path
      run: |
        # 优先使用特定的 NDK 版本
        NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
        if [ ! -d "$NDK_PATH" ]; then
          # 如果不存在，尝试查找任何可用版本
          NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | grep -E "[0-9]+\.[0-9]+\.[0-9]+" | head -n 1)
        fi
        if [ -z "$NDK_PATH" ]; then
          NDK_PATH="$ANDROID_HOME/ndk-bundle"
        fi
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "Found NDK at: $NDK_PATH"

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-android-${{ hashFiles('projects/android/PrismaAndroid/**/*.gradle*') }}

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: projects/android/PrismaAndroid/.cxx
        key: ${{ runner.os }}-android-runtime-${{ env.BUILD_TYPE }}-${{ hashFiles('src/**', 'projects/android/PrismaAndroid/**/CMakeLists.txt', 'projects/android/PrismaAndroid/**/build.gradle*') }}

    - name: Grant execute permission
      run: chmod +x ./gradlew

    - name: Build APK
      run: |
        # capitalize first letter for Gradle task
        gradle_task=$(echo "${{ env.BUILD_TYPE }}" | sed 's/./\u&/')
        ./gradlew assemble${gradle_task} --build-cache --parallel

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-runtime-${{ env.BUILD_TYPE }}
        path: projects/android/PrismaAndroid/app/build/outputs/apk/${{ env.BUILD_TYPE }}/*.apk
        retention-days: 30
        if-no-files-found: ignore
