name: Build Linux Engine

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/engine/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-linux-engine.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/engine/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-linux-engine.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
        - Debug
        - Release
        - Both
      arch:
        description: 'Architecture to build'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - x64
        - arm64

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  # Debug x64 build
  build-linux-engine-x64-debug:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'Debug' || github.event.inputs.build_type == 'Both'
    name: Linux Engine x64 Debug
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Install SDL3 and Vulkan dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev libdrm-dev libvulkan-dev vulkan-tools

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/engine-linux-x64-debug
        key: ${{ runner.os }}-engine-linux-x64-debug-${{ hashFiles('src/engine/**', 'cmake/**', 'CMakeLists.txt', 'CMakePresets.json') }}
        restore-keys: |
          ${{ runner.os }}-engine-linux-x64-debug-
          ${{ runner.os }}-engine-linux-

    - name: Configure CMake
      run: cmake --preset engine-linux-x64-debug

    - name: Build Engine
      run: cmake --build build/engine-linux-x64-debug --parallel 2

    - name: Package
      run: |
        mkdir -p artifacts/x64
        cmake --install build/engine-linux-x64-debug --config Debug --prefix artifacts/x64
        tar czf PrismaEngine-linux-x64-debug.tar.gz -C artifacts .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEngine-linux-x64-debug
        path: PrismaEngine-linux-x64-debug.tar.gz
        retention-days: 30

  # Debug ARM64 build
  build-linux-engine-arm64-debug:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'Debug' || github.event.inputs.build_type == 'Both') && (github.event.inputs.arch == 'all' || github.event.inputs.arch == 'arm64')
    name: Linux Engine ARM64 Debug
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Ninja and cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build g++-aarch64-linux-gnu

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/engine-linux-arm64-debug
        key: ${{ runner.os }}-engine-linux-arm64-debug-${{ hashFiles('src/engine/**', 'cmake/**', 'CMakeLists.txt', 'CMakePresets.json') }}
        restore-keys: |
          ${{ runner.os }}-engine-linux-arm64-debug-
          ${{ runner.os }}-engine-linux-

    - name: Configure CMake
      run: cmake --preset engine-linux-arm64-debug

    - name: Build Engine
      run: cmake --build build/engine-linux-arm64-debug --parallel 2
      continue-on-error: true

    - name: Package
      if: success()
      run: |
        mkdir -p artifacts/arm64
        cmake --install build/engine-linux-arm64-debug --config Debug --prefix artifacts/arm64
        tar czf PrismaEngine-linux-arm64-debug.tar.gz -C artifacts .

    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEngine-linux-arm64-debug
        path: PrismaEngine-linux-arm64-debug.tar.gz
        retention-days: 30

  # Release x64 build
  build-linux-engine-x64-release:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'Release' || github.event.inputs.build_type == 'Both')
    name: Linux Engine x64 Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Ninja
      run: sudo apt-get install -y ninja-build

    - name: Install SDL3 and Vulkan dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev libdrm-dev libvulkan-dev vulkan-tools

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/engine-linux-x64-release
        key: ${{ runner.os }}-engine-linux-x64-rel-${{ hashFiles('src/engine/**', 'cmake/**', 'CMakeLists.txt', 'CMakePresets.json') }}
        restore-keys: |
          ${{ runner.os }}-engine-linux-x64-rel-
          ${{ runner.os }}-engine-linux-rel-

    - name: Configure CMake
      run: cmake --preset engine-linux-x64-release

    - name: Build Engine
      run: cmake --build build/engine-linux-x64-release --parallel 2

    - name: Package
      run: |
        mkdir -p artifacts/x64
        cmake --install build/engine-linux-x64-release --config Release --prefix artifacts/x64
        tar czf PrismaEngine-linux-x64-release.tar.gz -C artifacts .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEngine-linux-x64-release
        path: PrismaEngine-linux-x64-release.tar.gz
        retention-days: 30

  # Release ARM64 build
  build-linux-engine-arm64-release:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'Release' || github.event.inputs.build_type == 'Both') && (github.event.inputs.arch == 'all' || github.event.inputs.arch == 'arm64')
    name: Linux Engine ARM64 Release
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Ninja and cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build g++-aarch64-linux-gnu

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/engine-linux-arm64-release
        key: ${{ runner.os }}-engine-linux-arm64-rel-${{ hashFiles('src/engine/**', 'cmake/**', 'CMakeLists.txt', 'CMakePresets.json') }}
        restore-keys: |
          ${{ runner.os }}-engine-linux-arm64-rel-
          ${{ runner.os }}-engine-linux-rel-

    - name: Configure CMake
      run: cmake --preset engine-linux-arm64-release

    - name: Build Engine
      run: cmake --build build/engine-linux-arm64-release --parallel 2
      continue-on-error: true

    - name: Package
      if: success()
      run: |
        mkdir -p artifacts/arm64
        cmake --install build/engine-linux-arm64-release --config Release --prefix artifacts/arm64
        tar czf PrismaEngine-linux-arm64-release.tar.gz -C artifacts .

    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEngine-linux-arm64-release
        path: PrismaEngine-linux-arm64-release.tar.gz
        retention-days: 30
