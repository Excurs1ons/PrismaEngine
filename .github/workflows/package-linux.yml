name: Package Linux

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
        - debug
        - release
        - both

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  build-linux-engine:
    name: Linux Engine ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libvulkan-dev \
          libpulse-dev \
          libxkbcommon-dev \
          libwayland-dev \
          libwayland-egl-dev

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: .dependencies
        key: ${{ runner.os }}-deps-${{ hashFiles('cmake/DependencyVersions.cmake') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Configure CMake
      run: |
        cmake -B build/engine-linux-x64-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DPRISMA_BUILD_EDITOR=OFF \
          -DPRISMA_BUILD_RUNTIME=OFF \
          -DPRISMA_ENABLE_RENDER_VULKAN=ON \
          -DPRISMA_ENABLE_AUDIO_SDL3=ON \
          -DPRISMA_USE_FETCHCONTENT=ON \
          -G Ninja

    - name: Build Engine
      run: cmake --build build/engine-linux-x64-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} --parallel

    - name: Package Engine
      run: |
        cfg="${{ matrix.build_type }}"
        pkg_dir="package-engine-x64-$cfg"

        # 创建包目录结构
        mkdir -p "$pkg_dir/lib/$cfg"
        mkdir -p "$pkg_dir/include"
        mkdir -p "$pkg_dir/bin/$cfg"

        # 复制库文件
        cp build/engine-linux-x64-$(echo "$cfg" | tr '[:upper:]' '[:lower:]')/lib/libPrismaEngine.so* "$pkg_dir/lib/$cfg/" 2>/dev/null || true

        # 复制头文件（排除内部实现）
        find src/engine -name "*.h" -not -path "*/adapters/*" -not -path "*/drivers/*" -not -path "*/platform/*" | while read header; do
          dest="$pkg_dir/include/${header#src/engine/}"
          mkdir -p "$(dirname "$dest")"
          cp "$header" "$dest"
        done

        # 打包
        tar czf "PrismaEngine-x64-$cfg.tar.gz" -C "$pkg_dir" .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEngine-x64-linux-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}
        path: PrismaEngine-x64-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}.tar.gz
        retention-days: 30

  build-linux-runtime:
    name: Linux Runtime ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    needs: build-linux-engine
    if: github.event.inputs.build_type != 'debug' || matrix.build_type == 'Debug'

    strategy:
      matrix:
        build_type: [Debug, Release]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libvulkan-dev \
          libpulse-dev \
          libxkbcommon-dev \
          libwayland-dev \
          libwayland-egl-dev

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: .dependencies
        key: ${{ runner.os }}-deps-${{ hashFiles('cmake/DependencyVersions.cmake') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Configure CMake
      run: |
        cmake -B build/runtime-linux-x64-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DPRISMA_BUILD_EDITOR=OFF \
          -DPRISMA_ENABLE_RENDER_VULKAN=ON \
          -DPRISMA_ENABLE_AUDIO_SDL3=ON \
          -DPRISMA_USE_FETCHCONTENT=ON \
          -G Ninja

    - name: Build Runtime
      run: cmake --build build/runtime-linux-x64-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} --target Runtime --parallel

    - name: Build Game
      run: cmake --build build/runtime-linux-x64-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} --target Game --parallel

    - name: Package Runtime
      run: |
        cfg="${{ matrix.build_type }}"
        pkg_dir="package-runtime-x64-$cfg"
        build_dir="build/runtime-linux-x64-$(echo "$cfg" | tr '[:upper:]' '[:lower:]')"

        # 创建包目录
        mkdir -p "$pkg_dir"

        # 复制可执行文件和库
        cp "$build_dir/bin/PrismaRuntime" "$pkg_dir/" 2>/dev/null || true
        cp "$build_dir/bin/"*.so* "$pkg_dir/" 2>/dev/null || true

        # 复制资源
        cp -r assets "$pkg_dir/assets" 2>/dev/null || true
        cp -r projects "$pkg_dir/projects" 2>/dev/null || true

        # 打包
        tar czf "PrismaRuntime-x64-$cfg.tar.gz" -C "$pkg_dir" .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaRuntime-x64-linux-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}
        path: PrismaRuntime-x64-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}.tar.gz
        retention-days: 30
