name: PrismaCraft CI

on:
  workflow_run:
    workflows: ["CI Windows"]
    types: [completed]
  workflow_dispatch:

jobs:
  build-prismacraft:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    name: Build PrismaCraft
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: '3.31.0'

    - name: Build Engine with SDK (includes PrismaCraft)
      run: |
        cmake --preset engine-windows-x64-debug -DPRISMA_BUILD_SDK=ON
        cmake --build build/engine-windows-x64-debug --config Debug --parallel

    - name: Verify PrismaCraft built
      run: |
        if (Test-Path "build\engine-windows-x64-debug\projects\PrismaCraft\libPrismaCraft.lib") {
            Write-Host "PrismaCraft library built successfully!"
            Get-ChildItem "build\engine-windows-x64-debug\projects\PrismaCraft\*.lib"
        } else {
            Write-Host "Warning: PrismaCraft lib not found at expected location"
            Get-ChildItem "build\engine-windows-x64-debug" -Recurse -Filter "*.lib" | Select-Object FullName
            exit 1
        }

    - name: Upload PrismaCraft Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PrismaCraft-Debug
        path: build/engine-windows-x64-debug/projects/PrismaCraft/
