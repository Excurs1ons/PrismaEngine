name: Build Windows Editor

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/editor/**'
      - 'src/engine/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-windows-editor.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/editor/**'
      - 'src/engine/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-windows-editor.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
        - Debug
        - Release
        - Both

env:
  CMAKE_VERSION: '3.31.0'

jobs:
  # Debug build (auto on push)
  build-windows-editor-debug:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'Debug' || github.event.inputs.build_type == 'Both'
    name: Windows Editor Debug
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Vulkan SDK
      uses: humbledev/setup-vulkan@v1.6
      with:
        vulkan-query-version: 1.3.204.1
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/editor-windows-x64-debug
        key: ${{ runner.os }}-editor-win64-debug-${{ hashFiles('src/**', 'cmake/**', 'CMakeLists.txt', 'CMakePresets.json') }}

    - name: Clean old dependencies cache
      shell: pwsh
      run: Remove-Item -Path "build\editor-windows-x64-debug\_deps\stb" -Recurse -Force -ErrorAction SilentlyContinue

    - name: Configure CMake
      run: cmake --preset editor-windows-x64-debug

    - name: Build Editor
      run: cmake --build build/editor-windows-x64-debug --config Debug --target PrismaEditor --parallel

    - name: Package
      run: |
        mkdir -p package-x64-debug
        copy build\editor-windows-x64-debug\bin\Debug\PrismaEditor.exe package-x64-debug\
        copy build\editor-windows-x64-debug\bin\Debug\*.dll package-x64-debug\ 2>nul || echo No DLLs
        xcopy assets package-x64-debug\assets /E /I /Y 2>nul || echo No assets
        cd package-x64-debug
        7z a ..\PrismaEditor-win64-debug.zip *

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEditor-win64-debug
        path: PrismaEditor-win64-debug.zip
        retention-days: 30

  # Release build (manual only)
  build-windows-editor-release:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'Release' || github.event.inputs.build_type == 'Both')
    name: Windows Editor Release
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Setup Vulkan SDK
      uses: humbledev/setup-vulkan@v1.6
      with:
        vulkan-query-version: 1.3.204.1
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ./build/editor-windows-x64-release
        key: ${{ runner.os }}-editor-win64-rel-${{ hashFiles('src/**', 'cmake/**', 'CMakeLists.txt', 'CMakePresets.json') }}

    - name: Clean old dependencies cache
      shell: pwsh
      run: Remove-Item -Path "build\editor-windows-x64-release\_deps\stb" -Recurse -Force -ErrorAction SilentlyContinue

    - name: Configure CMake
      run: cmake --preset editor-windows-x64-release

    - name: Build Editor
      run: cmake --build build/editor-windows-x64-release --config Release --target PrismaEditor --parallel

    - name: Package
      run: |
        mkdir -p package-x64-release
        copy build\editor-windows-x64-release\bin\Release\PrismaEditor.exe package-x64-release\
        copy build\editor-windows-x64-release\bin\Release\*.dll package-x64-release\ 2>nul || echo No DLLs
        xcopy assets package-x64-release\assets /E /I /Y 2>nul || echo No assets
        cd package-x64-release
        7z a ..\PrismaEditor-win64-release.zip *

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismaEditor-win64-release
        path: PrismaEditor-win64-release.zip
        retention-days: 30
